<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST LOGIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{font-family:Arial; text-align:center; padding-top:50px; background:#0f172a; color:white;}
        button{padding:15px 30px; font-size:18px; background:#16a34a; color:white; border:none; border-radius:8px; cursor:pointer;}
        button:hover{background:#15803d;}
    </style>
</head>
<body>

<h1>TEST LOGIN WITH GITHUB</h1>
<button onclick="loginGit()">LOGIN WITH GITHUB</button>

<script>
// === TAMANG DETALYE MO ===
const supabase = supabase.createClient(
    "https://ukcedjaroenwupefohuv.supabase.co",
    "sb_publishable_XDE34ggUBcxNmQNirhfHyQ_1ItJZJgD"
);

async function loginGit(){
    const {error} = await supabase.auth.signInWithOAuth({
        provider: "github",
        options:{
            redirectTo: "https://kianhanma6-source.github.io/AL-HAYAH-AL-SALAH-INVENTORY-/"
        }
    });
    if(error) alert("ERROR: " + error.message);
}

// Check kung naka-login na
(async ()=>{
    const {data:{user}} = await supabase.auth.getUser();
    if(user){
        alert("✅ TAGUMPAY! Naka-login ka na: " + user.user_metadata.name);
        // Kapag gumana na, dito mo ilalagay kung saan pupunta
        // window.location.href = "pangunahing pahina.html";
    }
})();
</script>

</body>
</html>
