<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL HAYAH AL SAHLAH - INVENTORY SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: rgba(30, 41, 59, 0.9);
            padding: 40px 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #facc15;
        }
        h1 {
            color: #f472b6;
            font-size: 22px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .btn-github {
            width: 100%;
            padding: 14px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-github:hover {
            background: #15803d;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="logo.png" alt="AL HAYAH AL SAHLAH" class="logo">
    <h1>WAREHOUSE INVENTORY SYSTEM</h1>

    <button class="btn-github" onclick="loginWithGitHub()">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        LOGIN WITH GITHUB
    </button>

    <div class="footer">NAD ITALLO PROGRAMMER v1.0</div>
</div>

<script>
// === ITO ANG TAMANG DETALYE MO ===
const SUPABASE_URL = "https://ukcedjaroenwupefohuv.supabase.co";
const SUPABASE_KEY = "sb_publishable_XDE34ggUBcxNmQNirhfHyQ_1ItJZJgD";
const REDIRECT_URL = "https://kianhanma6-source.github.io/AL-HAYAH-AL-SALAH-INVENTORY-/";

// Ikonekta sa Supabase
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Function para sa Login
async function loginWithGitHub() {
    const { error } = await supabase.auth.signInWithOAuth({
        provider: 'github',
        options: {
            redirectTo: REDIRECT_URL
        }
    });

    if (error) {
        alert("May Mali: " + error.message);
    }
}

// I-check kung naka-login na
async function checkUser() {
    const { data: { user } } = await supabase.auth.getUser();
    if (user) {
        // Kapag naka-login na, dito mo ilalagay kung saan pupunta
        alert("Maligayang Pagbabalik: " + user.user_metadata.name);
        // window.location.href = "pangunahing pahina.html";
    }
}

// Simulan ang pag-check
checkUser();
</script>

</body>
</html>
